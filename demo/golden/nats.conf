# NATS server configuration for Bordeaux C-UAS golden demo
# TCP client port + WebSocket for browser-based C2

port: 4222
websocket {
  port: 9222
  no_tls: true
}

jetstream {
  store_dir: "/tmp/furia-bod-nats-js"
  max_memory_store: 268435456  # 256 MB
}

# No auth for demo/local use
authorization {
  timeout: 5.0
}