name: Bordeaux Golden Contract

on:
  pull_request:
  push:
    branches: [master]

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check script syntax
        run: |
          python -m py_compile demo/golden/replay.py demo/golden/verify.py demo/golden/verify_origin.py demo/golden/verify_comm_denied.py
          bash -n demo/golden/doctor.sh demo/golden/run.sh demo/golden/smoke.sh
      - name: Enforce canonical authority path
        shell: bash
        run: |
          set -euo pipefail
          ! grep -q '"swarm.intent.submit"' demo/golden/replay.py
          ! grep -q '"furia.s1.mission-delegation"[[:space:]]*,' demo/golden/replay.py
          ! grep -q '"furia.s1.execution-evidence"[[:space:]]*,' demo/golden/replay.py
          grep -q '"operator.action.authorized"' demo/golden/replay.py
          grep -q 'bod-demo-auth-4660' demo/golden/replay.py
          grep -q 'ROGUE_TRACK_ID = "4660"' demo/golden/replay.py
          grep -q 'rogue_kinematic_events' demo/golden/replay.py
          grep -Fq 'record[6:9]' demo/golden/replay.py
          ! grep -Fq 'record[7:10]' demo/golden/replay.py
          grep -q '"safety.civilian_aircraft_conflict"' demo/golden/replay.py
          grep -q 'surveillance.origin.bearing' demo/golden/replay.py
          grep -q 'surveillance.origin.tdoa_fix' demo/golden/replay.py
          grep -q 's1.sim.execution-health' demo/golden/replay.py
          grep -q 'SUB furia.s1.mission-delegation' demo/golden/verify.py
          grep -q 'SUB furia.s1.execution-progress' demo/golden/verify.py
          grep -q 'SUB swarm.command.abort' demo/golden/verify.py
          grep -q 'SUB swarm.command.result.abort' demo/golden/verify.py
          grep -q 'SUB cuas.risk.protected_volume' demo/golden/verify.py
          grep -q 'SUB cuas.incident.state' demo/golden/verify.py
          grep -q 'target.get("track_id") == ROGUE_TRACK_ID' demo/golden/verify.py
          grep -q 'any(component != 0 for component in velocity)' demo/golden/verify.py
          grep -q 'assert_causal_order' demo/golden/verify.py
          grep -q 'final_abort_evidence' demo/golden/verify.py
      - name: Verify threat-origin evidence contract
        shell: bash
        run: |
          set -euo pipefail
          grep -q 'SUB cuas.emitter.localization' demo/golden/verify_origin.py
          grep -q 'SUB cuas.threat.origin' demo/golden/verify_origin.py
          grep -q 'Core delegated before valid emitter + launch-origin evidence' demo/golden/verify_origin.py
          grep -q 'never_auto_authorize_mitigation: true' demo/golden/threat-origin.yaml
          grep -q 'publish_observed_evidence_only: true' demo/golden/threat-origin.yaml
      - name: Verify bounded comm-denied contract
        shell: bash
        run: |
          set -euo pipefail
          grep -q 'lost_link_continuation' demo/golden/verify_comm_denied.py
          grep -q 'degraded_mode") == "normal"' demo/golden/verify_comm_denied.py
          grep -q 'contract_remaining_ms' demo/golden/verify_comm_denied.py
          grep -q 'cuas-health-injector' demo/golden/run.sh
          grep -q 'wait "$COMM_VERIFY_PID"' demo/golden/run.sh
          grep -q 'require_comm_denied_continuation: true' demo/golden/timeline.yaml
          grep -q 'require_comm_recovery_visibility: true' demo/golden/timeline.yaml
      - name: Verify one-command smoke contract
        shell: bash
        run: |
          set -euo pipefail
          grep -q 'GOLDEN_EXIT_AFTER_ACCEPTANCE=1' demo/golden/smoke.sh
          grep -q 'exec bash "$SCRIPT_DIR/run.sh"' demo/golden/smoke.sh
          grep -q 'wait "$VERIFY_PID"' demo/golden/run.sh
          grep -q 'wait "$ORIGIN_VERIFY_PID"' demo/golden/run.sh
          grep -q 'wait "$COMM_VERIFY_PID"' demo/golden/run.sh
          grep -q 'wait "$REPLAY_PID"' demo/golden/run.sh
          grep -q 'Post-scenario liveness' demo/golden/run.sh
          grep -q 'SMOKE RESULT: PASS' demo/golden/run.sh
      - name: Verify no direct abort injection
        shell: bash
        run: |
          set -euo pipefail
          ! grep -q '"swarm.command.abort"' demo/golden/replay.py
          ! grep -q '"operator.action.abort"' demo/golden/replay.py
